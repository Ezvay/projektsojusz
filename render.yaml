services:
  - type: web
    name: metin2-sojusz
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/src/data.db
    disk:
      name: db-storage
      mountPath: /opt/render/project/src
      sizeGB: 1

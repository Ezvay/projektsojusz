services:
  - type: web
    name: projekt-sojusz
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: sojusz-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
